name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
    steps:
      - name: Remove stale release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release delete "${{ github.ref_name }}" --repo "${{ github.repository }}" --yes || true

      - name: Create release
        id: create-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > release-notes.md <<'EOF'
          ## Health Reminder ${{ github.ref_name }}

          ### Platform packages
          - Windows: NSIS installer (.exe).
          - macOS: Intel and Apple Silicon DMG packages.
          - Linux: AppImage and Debian packages.

          ### Highlights
          - Parallel health reminders for sitting, water, eye rest, and custom tasks.
          - Custom notification sounds with system sound fallback.
          - Silent auto-start and tray-first startup support.
          - Floating countdown window and daily fixed-time reminders.
          - Paused floating countdowns now freeze consistently across global pause, per-task pause, lock screen, and idle state.
          - In-app version display now follows Tauri app metadata.
          - Update check failures now show readable error text in both light and dark themes.
          - Improved notification fallback and release links.

          Download the package that matches your platform below.
          EOF

          RELEASE_ID=$(gh api "repos/${{ github.repository }}/releases" \
            --method POST \
            -f tag_name="${{ github.ref_name }}" \
            -f name="Health Reminder ${{ github.ref_name }}" \
            -f body="$(cat release-notes.md)" \
            -F draft=false \
            -F prerelease=false \
            --jq '.id')
          echo "release_id=$RELEASE_ID" >> "$GITHUB_OUTPUT"

  release:
    needs: prepare-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libnm-dev \
            libdbus-1-dev \
            libasound2-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libxss-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  update-scoop-hash:
    needs: release
    runs-on: ubuntu-latest
    if: success()
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Download Windows installer
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_TAG=${{ github.ref_name }}
          ASSET_NAME=$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[] | select(.name | endswith("_x64-setup.exe")) | .name')
          gh release download "$RELEASE_TAG" -p "*_x64-setup.exe" -D "$GITHUB_WORKSPACE"
          echo "Downloaded $ASSET_NAME"

      - name: Calculate SHA256 hash
        id: hash
        run: |
          HASH=$(sha256sum *.exe | awk '{print $1}')
          echo "hash=$HASH" >> $GITHUB_OUTPUT
          echo "Calculated hash: $HASH"

      - name: Update bucket manifest
        run: |
          HASH="${{ steps.hash.outputs.hash }}"
          VERSION=${{ github.ref_name }}
          VERSION=${VERSION#v}

          jq --arg version "$VERSION" --arg hash "$HASH" \
            '.version = $version | .architecture."64bit".url = "https://github.com/kaima2022/Health-reminder/releases/download/v\($version)/health-reminder_\($version)_x64-setup.exe" | .architecture."64bit".hash = $hash' \
            bucket/health-reminder.json > bucket/health-reminder.json.tmp

          mv bucket/health-reminder.json.tmp bucket/health-reminder.json

      - name: Commit and push changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add bucket/health-reminder.json
          git commit -m "chore: update scoop manifest hash for ${{ github.ref_name }}"
          git push
